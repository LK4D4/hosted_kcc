services:
  suwayomi:
    image: ghcr.io/suwayomi/suwayomi-server:stable
    container_name: suwayomi
    user: "${PUID:?set PUID}:${PGID:?set PGID}"
    environment:
      TZ: "${TZ:?set TZ}"
      AUTH_MODE: basic_auth
      AUTH_USERNAME: "${SUWAYOMI_AUTH_USERNAME:?set SUWAYOMI_AUTH_USERNAME}"
      AUTH_PASSWORD: "${SUWAYOMI_AUTH_PASSWORD:?set SUWAYOMI_AUTH_PASSWORD}"
    volumes:
      - "${SUWAYOMI_DOWNLOADS_DIR:?set SUWAYOMI_DOWNLOADS_DIR}:/home/suwayomi/.local/share/Tachidesk/downloads"
      - "${SUWAYOMI_DATA_DIR:?set SUWAYOMI_DATA_DIR}:/home/suwayomi/.local/share/Tachidesk"
    ports:
      - "${SUWAYOMI_PORT:?set SUWAYOMI_PORT}:4567"
    network_mode: "${DOCKER_NETWORK_MODE:?set DOCKER_NETWORK_MODE}"
    security_opt:
      - no-new-privileges:true
    restart: always

  hosted-kcc:
    image: ghcr.io/lk4d4/hosted_kcc:latest
    container_name: hosted-kcc
    user: "${PUID:?set PUID}:${PGID:?set PGID}"
    environment:
      TZ: "${TZ:?set TZ}"
      HOSTED_KCC_OUTPUT_MODE: suwayomi_local
    volumes:
      - "${HOSTED_KCC_DATA_DIR:?set HOSTED_KCC_DATA_DIR}:/data"
      - "${HOSTED_KCC_INPUT_DIR:?set HOSTED_KCC_INPUT_DIR}:/input:ro"
      - "${HOSTED_KCC_OUTPUT_DIR:?set HOSTED_KCC_OUTPUT_DIR}:/output"
    network_mode: "${DOCKER_NETWORK_MODE:?set DOCKER_NETWORK_MODE}"
    security_opt:
      - no-new-privileges:true
    restart: always
